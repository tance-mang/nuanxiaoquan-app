name: warmcircle
description: 暖小圈 - 记账·生活·学习 三合一智能工具
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ══════════════════════════════════════════════════════════
  # 核心功能插件（全部来自 pub.dev 官方，无需额外下载）
  # ══════════════════════════════════════════════════════════

  # ── UI 基础 ──────────────────────────────────
  cupertino_icons: ^1.0.8      # iOS风格图标
  flutter_screenutil: ^5.9.0   # 屏幕尺寸适配（必装！支持手机+平板多尺寸）
  
  # ── 状态管理 / 路由 ───────────────────────────
  get: ^4.7.3                  # GetX三合一：状态管理+路由+依赖注入

  # ── 网络请求（自动检测离线） ────────────────────
  dio: ^5.4.0                  # 网络请求库
  connectivity_plus: ^7.1.1    # 网络状态检测（离线模式核心）

  # ── 本地存储（离线必备） ──────────────────────
  shared_preferences: ^2.5.3   # 轻量KV存储
  sqflite: ^2.4.2              # 本地SQLite数据库（离线数据缓存）
  path_provider: ^2.1.2        # 获取本地路径

  # ── 数据可视化（本地渲染，无需联网）──────────────
  fl_chart: ^1.1.0             # 折线图/柱状图/饼图（离线可用）
  
  # ── 日历 ──────────────────────────────────────
  table_calendar: ^3.2.0       # 学习计划日历、生理期日历

  # ── 图片处理 ──────────────────────────────────
  cached_network_image: ^3.4.1 # 网络图片缓存（离线查看已缓存图片）
  image_picker: ^1.2.1         # 从相册/相机选图
  screenshot: ^3.0.0           # 页面截屏生成分享图（完全替代AI生图）

  # ── 文件处理 ──────────────────────────────────
  file_picker: ^8.3.7          # 选择PDF等文件

  # ── 时间格式化 ────────────────────────────────
  intl: ^0.20.2                # 日期格式化（中文日期）

  # ── 分享 ──────────────────────────────────────
  share_plus: ^12.0.2          # 分享图片/文字到微信等

  # ── 二维码 ────────────────────────────────────
  qr_flutter: ^4.1.0           # 生成二维码（学习计划分享）

  # ── 权限管理 ──────────────────────────────────
  permission_handler: ^12.0.1  # 动态申请权限

  # ── 工具 ──────────────────────────────────────
  url_launcher: ^6.2.6         # 打开外部链接（经过安全检测）
  package_info_plus: ^9.0.1    # 获取APP版本号
  flutter_email_sender: ^8.0.0 # 用户反馈一键发邮箱
  
  # ── 加密（本地数据安全） ──────────────────────
  encrypt: ^5.0.3              # 本地敏感数据加密存储

  # ── 推送通知（本地离线推送，无需服务器）────────
  flutter_local_notifications: ^19.5.0  # 经期/学习/记账本地提醒

  # ── 自动记账通知监听 ──────────────────────────
  # notification_listener_service: ^0.0.8  # 监听微信/支付宝通知（安卓）

  # ── 系统设置跳转（引导开通知权限）──────────────
  app_settings: ^7.0.0

  # ══════════════════════════════════════════════════════════
  # 所有插件说明：
  # 1. 全部来自 pub.dev 官方仓库，执行 flutter pub get 自动下载
  # 2. 打包后内置进APK/IPA，无需用户额外安装
  # 3. 离线模式下图表/壁纸/本地数据全部可用
  # 4. 无版权限制，个人开发/参赛完全免费
  # ══════════════════════════════════════════════════════════

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # 如果有自定义字体可以配置，没有就用系统默认
  # fonts:
  #   - family: PingFang
  #     fonts:
  #       - asset: assets/fonts/PingFang-Regular.ttf
